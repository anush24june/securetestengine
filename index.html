<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finspire Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --fs-purple: #8C2E81;
            --fs-orange: #F19F29;
            --fs-dark: #2c3e50;
            --fs-bg: #f8f9fa;
            --white: #ffffff;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--fs-bg); }

        /* Login Centering */
        #login-section {
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%; max-width: 400px; border-top: 8px solid var(--fs-purple);
        }

        /* Admin Layout */
        #admin-wrapper { display: none; height: 100vh; flex-direction: row; }

        /* Sidebar */
        .sidebar {
            width: 260px; background: var(--fs-dark); color: white; display: flex; flex-direction: column; padding: 20px;
        }
        .sidebar h2 { font-size: 1.2rem; color: var(--fs-orange); margin-bottom: 30px; text-align: center; }
        .nav-btn {
            background: transparent; border: none; color: white; padding: 15px; text-align: left;
            font-size: 16px; cursor: pointer; border-radius: 8px; transition: 0.2s; margin-bottom: 10px;
        }
        .nav-btn:hover, .nav-btn.active { background: var(--fs-purple); }

        /* Main Content Area */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .view { display: none; animation: fadeIn 0.3s; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: white; padding: 25px; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 800px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }

        .btn-primary {
            background: var(--fs-orange); color: white; border: none; padding: 12px 24px;
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;
        }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .stat-box { background: #f1f3f5; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-box h3 { margin: 0; color: var(--fs-purple); }
    </style>
</head>
<body>

    <div id="login-section">
        <div class="login-card">
            <h2 style="color: var(--fs-purple); text-align: center;">FINSPIRE PORTAL</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@finspire.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password">
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="handleLogin()">LOG IN</button>
            <div id="status-msg" style="margin-top:15px; text-align:center;"></div>
        </div>
    </div>

    <div id="admin-wrapper">
        <div class="sidebar">
            <h2>FINSPIRE ADMIN</h2>
            <button class="nav-btn active" onclick="switchView('dashboard-view')">Dashboard</button>
            <button class="nav-btn" onclick="switchView('assign-view')">Assign Test</button>
            <div style="margin-top: auto;">
                <button class="nav-btn" onclick="location.reload()" style="width: 100%; opacity: 0.7;">Logout</button>
            </div>
        </div>

        <div class="main-content">
<div id="dashboard-view" class="view active">
    <h1>Student Analytics</h1>
    <div class="card">
        <div class="form-group">
            <label>Select Student</label>
            <select id="dashboard-user-select" onchange="loadStudentSummary()">
                <option value="">-- Select Student --</option>
            </select>
        </div>

        <div id="student-summary-area" style="display: none;">
            <div class="stat-grid">
                <div class="stat-box"><p>Assigned</p><h3 id="stat-assigned">0</h3></div>
                <div class="stat-box"><p>Completed</p><h3 id="stat-completed">0</h3></div>
                <div class="stat-box"><p>Avg Score</p><h3 id="stat-avg">N/A</h3></div>
            </div>

            <h3 style="margin-top:30px;">Detailed History</h3>
            <div style="overflow-x:auto;">
                <table id="history-table" style="width:100%; border-collapse: collapse; margin-top:10px;">
                    <thead>
                        <tr style="background:#eee; text-align:left;">
                            <th style="padding:10px; border-bottom:2px solid var(--fs-purple);">Test Name</th>
                            <th style="padding:10px; border-bottom:2px solid var(--fs-purple);">Date Assigned</th>
                            <th style="padding:10px; border-bottom:2px solid var(--fs-purple);">Date Taken</th>
                            <th style="padding:10px; border-bottom:2px solid var(--fs-purple);">Score</th>
                            <th style="padding:10px; border-bottom:2px solid var(--fs-purple);">Documents</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

            <div id="assign-view" class="view">
                <h1>Assign New Testlet</h1>
                <div class="card">
                    <div class="form-group">
                        <label>Target Student</label>
                        <select id="assign-user-select">
                            <option value="">-- Loading --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Select Testlet</label>
                        <select id="assign-test-select">
                            <option value="">-- Loading --</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="assignTest()">ASSIGN TO STUDENT</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="otp-gate" style="display:none; margin-top: 20px; border: 2px solid var(--fs-purple); padding: 20px; border-radius: 10px;">
    <h3>Verification Required</h3>
    <p>Please enter the 6-digit code sent to your email.</p>
    <input type="text" id="otp-code" placeholder="123456" style="text-align:center; font-size: 24px; letter-spacing: 5px;">
    <button class="btn-primary" onclick="verifyAndOpen()">VERIFY & START TEST</button>
</div>

    <script>
const SUPABASE_URL = 'https://ezxcjslmitiscygriusu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_a_Y75-A7fE3hoCe8Td_lvw_Gja4rJdY';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 1. AUTO-LOGIN CHECK
window.onload = async function() {
    const { data: { session } } = await _supabase.auth.getSession();
    const urlParams = new URLSearchParams(window.location.search);
    const isVerifyMode = urlParams.get('mode') === 'verify';

    if (session) {
        const userId = session.user.id;
        
        // 1. Check Role
        const { data: profile } = await _supabase.from('profiles').select('role').eq('id', userId).single();
        
        if (profile?.role === 'admin' && !isVerifyMode) {
            // ADMIN PATH: Show Dashboard
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-wrapper').style.display = 'flex';
            initializeAdminData();
        } else {
            // STUDENT PATH: Direct to Test
            handleStudentFlow(userId);
        }
    }
};

async function handleStudentFlow(userId) {
    // Find their pending test
    const { data: assignment } = await _supabase
        .from('test_assignments')
        .select('*, tests(file_url)')
        .eq('student_id', userId)
        .eq('status', 'pending')
        .limit(1)
        .single();

    if (assignment) {
        // Hide everything and only show the OTP Gate
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-wrapper').style.display = 'none'; // Ensure admin UI is hidden
        document.getElementById('otp-gate').style.display = 'block';
        
        // Save the URL to a global variable for the button to use
        window.targetTestUrl = assignment.tests.file_url;
    } else {
        alert("No pending tests found. Please contact Finspire Admin.");
    }
}

function verifyAndOpen() {
    // This is called by the 'VERIFY & START TEST' button
    if (window.targetTestUrl) {
        window.location.href = window.targetTestUrl;
    }
}


// 2. AUTH & ROLE CHECK
async function handleLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

    if (error) {
        document.getElementById('status-msg').innerHTML = `<span style="color:red">${error.message}</span>`;
    } else {
        checkRole(data.user.id);
    }
}

async function checkRole(userId) {
    const { data: profile } = await _supabase.from('profiles').select('role').eq('id', userId).single();
    
    if (profile && profile.role === 'admin') {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-wrapper').style.display = 'flex';
        initializeAdminData();
    } else {
        // This is a student
        handleStudentAutoRedirect(userId);
    }
}

async function handleStudentAutoRedirect(userId) {
    // 1. Look for the most recent pending test for this student
    const { data: assignments, error } = await _supabase
        .from('test_assignments')
        .select(`
            id,
            tests ( file_url )
        `)
        .eq('student_id', userId)
        .eq('status', 'pending')
        .order('created_at', { ascending: false })
        .limit(1);

    if (error || !assignments || assignments.length === 0) {
        console.log("No pending tests found for redirect.");
        return;
    }

    const testUrl = assignments[0].tests.file_url;

    // 2. Immediate Redirect to the Test
    if (testUrl) {
        alert("Verification successful! Opening your test now...");
        window.location.href = testUrl; 
    }
}



// 3. UI NAVIGATION
function switchView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    if (window.event && window.event.currentTarget) {
        window.event.currentTarget.classList.add('active');
    }
}

// 4. ADMIN DATA LOADING
async function initializeAdminData() {
    const { data: users } = await _supabase.from('profiles').select('id, email, role');
    const { data: tests } = await _supabase.from('tests').select('id, test_name');

    const selects = [document.getElementById('dashboard-user-select'), document.getElementById('assign-user-select')];
    selects.forEach(sel => {
        if (!sel) return;
        sel.innerHTML = '<option value="">-- Select User --</option>';
        users?.forEach(u => {
            let opt = document.createElement('option');
            opt.value = u.id;
            opt.textContent = u.role === 'admin' ? `${u.email} (Admin)` : u.email;
            sel.appendChild(opt);
        });
    });

    const testSel = document.getElementById('assign-test-select');
    if (testSel) {
        testSel.innerHTML = '<option value="">-- Select Test --</option>';
        tests?.forEach(t => {
            let opt = document.createElement('option');
            opt.value = t.id;
            opt.textContent = t.test_name;
            testSel.appendChild(opt);
        });
    }
}

// 5. TEST ASSIGNMENT & OTP
async function assignTest() {
    const sId = document.getElementById('assign-user-select').value;
    const tId = document.getElementById('assign-test-select').value;
    const sEmail = document.getElementById('assign-user-select').options[document.getElementById('assign-user-select').selectedIndex].text.replace(' (Admin)', '');

    if (!sId || !tId) return alert("Select a student and test!");

    const { error: dbError } = await _supabase.from('test_assignments').insert([{ student_id: sId, test_id: tId, status: 'pending' }]);
    if (dbError) return alert("DB Error: " + dbError.message);

    const { error: otpError } = await _supabase.auth.signInWithOtp({
        email: sEmail,
        options: { shouldCreateUser: false, emailRedirectTo: window.location.href }
    });

    if (otpError) alert("Email failed: " + otpError.message);
    else alert(`Success! OTP sent to ${sEmail}`);
}

async function loadStudentTests(userId) {
    const { data: assignments, error } = await _supabase
        .from('test_assignments')
        .select(`
            id,
            tests ( test_name, file_url )
        `)
        .eq('student_id', userId)
        .eq('status', 'pending');

    const listDiv = document.getElementById('assigned-tests-list');
    if (!listDiv) return; // Only runs if the student section exists

    listDiv.innerHTML = '';

    if (assignments && assignments.length > 0) {
        assignments.forEach(a => {
            const item = document.createElement('div');
            item.className = 'card';
            item.style.marginBottom = '15px';
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>${a.tests.test_name}</strong>
                    <button class="btn-primary" onclick="prepareTest('${a.tests.file_url}')">START TEST</button>
                </div>
            `;
            listDiv.appendChild(item);
        });
    } else {
        listDiv.innerHTML = '<p style="text-align:center;">No tests assigned yet.</p>';
    }
}


async function loadStudentSummary() {
    const studentId = document.getElementById('dashboard-user-select').value;
    if (!studentId) return;

    const { data: assignments, error } = await _supabase
        .from('test_assignments')
        .select('id, status, created_at, completed_at, score, pdf_result_url, proctor_folder_url, tests(test_name)')
        .eq('student_id', studentId);

    if (error) return console.error(error);

    document.getElementById('student-summary-area').style.display = 'block';
    document.getElementById('stat-assigned').textContent = assignments.length;
    
    const completed = assignments.filter(a => a.status === 'completed');
    document.getElementById('stat-completed').textContent = completed.length;

    const totalScore = completed.reduce((sum, curr) => sum + (curr.score || 0), 0);
    const avg = completed.length > 0 ? Math.round(totalScore / completed.length) : 0;
    document.getElementById('stat-avg').textContent = avg > 0 ? `${avg}%` : 'N/A';

    const tbody = document.getElementById('history-body');
    tbody.innerHTML = "";
    assignments.forEach(a => {
        const row = document.createElement('tr');
        row.style.borderBottom = "1px solid #eee";
        row.innerHTML = `
            <td style="padding:10px;">${a.tests?.test_name || 'Unknown'}</td>
            <td style="padding:10px;">${new Date(a.created_at).toLocaleDateString()}</td>
            <td style="padding:10px;">${a.completed_at ? new Date(a.completed_at).toLocaleDateString() : '---'}</td>
            <td style="padding:10px;">${a.score !== null ? a.score + '%' : 'Pending'}</td>
            <td style="padding:10px;">
                ${a.pdf_result_url ? `<a href="${a.pdf_result_url}" target="_blank">📄 PDF</a>` : ''}
                ${a.proctor_folder_url ? `<a href="${a.proctor_folder_url}" target="_blank" style="margin-left:10px;">📸 Photos</a>` : ''}
            </td>
        `;
        tbody.appendChild(row);
    });
}


    </script>
</body>
</html>
